version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: revenue-postgres
    environment:
      POSTGRES_USER: revenue
      POSTGRES_PASSWORD: revenue
      POSTGRES_DB: hotel_revenue
    ports:
      - "5432:5432"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U revenue -d hotel_revenue"]
      interval: 5s
      timeout: 5s
      retries: 5
